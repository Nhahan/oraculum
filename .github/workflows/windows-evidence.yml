name: Windows Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-evidence:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run curated Windows evidence corpus
        run: npm run evidence:beta:corpus

      - name: Run published package smoke
        run: npm run evidence:published-smoke
