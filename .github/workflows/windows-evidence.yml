name: Windows Evidence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-evidence:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run curated Windows evidence corpus
        env:
          ORACULUM_KEEP_EVIDENCE: "1"
        run: npm run evidence:beta:corpus

      - name: Run published package smoke
        run: npm run evidence:published-smoke

      - name: Upload Windows evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-evidence-workspaces
          path: ${{ runner.temp }}/oraculum-beta-evidence-*
          if-no-files-found: ignore
